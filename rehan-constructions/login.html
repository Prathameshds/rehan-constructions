<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rehan Constructions</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-left-content">
                <i class="fas fa-hard-hat"></i>
                <h1>Rehan Constructions</h1>
                <p>Streamline your construction business with our comprehensive management solution.</p>
                <div class="login-features">
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Deal & Project Management</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Worker Payment Tracking</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Material Expense Management</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Financial Reports & Analytics</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-right">
            <form class="login-form" id="login-form">
                <h2>Welcome Back</h2>
                <p>Please login to your account</p>
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="mobile">
                        <i class="fas fa-mobile-alt"></i>
                        Mobile Number
                    </label>
                    <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" required pattern="[0-9]{10}">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
                <div class="login-footer">
                    <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
